---
form:
  partition:
    widget: select
    label: Partition
    options:
      - [ batch,              batch,              set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - [ largemem,              largemem,              set-label-cores_memory_1: Number of cores (1 - 72),  set-max-cores_memory_1: 72 , set-label-cores_memory_2: Memory (up to 1000GB),   set-max-cores_memory_2:   1000 ]
      - [ preempt, preempt, set-label-cores_memory_1: Number of cores (1 - 64),   set-max-cores_memory_1:  64, set-label-cores_memory_2: Memory (up to 1500GB),  set-max-cores_memory_2:  1500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["rc2", "rc2",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["dinglab", "dinglab",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["heldweinlab", "heldweinlab",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["hugheslab", "hugheslab",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["laolab", "laolab",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["linlab", "linlab",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["liulab", "liulab",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["llab", "llab",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["panettalab", "panettalab",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["pangolinlab", "pangolinlab",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["patralab", "patralab",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["pettilab", "pettilab",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["ruiguolab", "ruiguolab",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["shushkovlab", "shushkovlab",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["vaseylab", "vaseylab",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
      - ["wongjiradla", "wongjiradla",            set-label-cores_memory_1: Number of cores (1 - 64),  set-max-cores_memory_1: 64, set-label-cores_memory_2: Memory (up to 500GB),  set-max-cores_memory_2:  500, set-label-time_1: Max run time hours (0 - 168), set-max-time_1: 168 ]
  cores_memory:
    widget: number
    label: [Number of cores, Memory]
    size:  2
    value: [ 1, 4 ]

  time:
    widget:   number
    label:    [ Max run time hours (0 - 24), Max run minutes (0 - 59) ]
    size:     2
    value:    [  1,  0 ]
    min:      [  0,  0 ]
    max:      [ 24, 59 ]
    step:     [  1,  1 ]

  show_advanced_option:
    widget: checkbox
    label:
    options:
      - ["Show advanced option", "", show-email, show-mail_option, show-array, show-log ]

  array:
    widget: number
    label: [ Array Job (start index), Array Job (last index) ]
    size: 2
    indent: 1
    min:  [0, 0]
    help: Each job executed from an array job is assigned a task ID, which can be referenced in the shell script via the environment variable SLURM_ARRAY_TASK_ID.
    
  mail_option:
    label: Mail option
    widget: checkbox
    direction: horizontal
    separator: ","
    indent: 1
    options:
      - [ "Beginning of job execution", 'BEGIN',   enable-email ]
      - [ "End of job execution",       'END',     enable-email ]
      - [ "Fail of job",                'FAIL',    enable-email ]
      - [ "When the job is requeued",   'REQUEUE', enable-email ]
      - [ "All",                        'ALL',     enable-email ]
      
  email:
    widget: email
    label:  Email
    indent: 2
    
script: |
  #!/bin/bash
  #SBATCH -p #{partition}
  #SBATCH -N 1
  #SBATCH -n #{cores_memory_1}
  #SBATCH --mem #{cores_memory_2}G
  #SBATCH -t #{time_1}:#{time_2}:00   
  #SBATCH --mail-user=#{email}
  #SBATCH --mail-type=#{mail_option}
  #SBATCH --error=%x-%J-%u.err
  #SBATCH --output=%x-%J-%u.out
